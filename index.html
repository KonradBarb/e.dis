<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deutsch Übung</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    #screen {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      box-sizing: border-box;
      font-size: 2rem;
      line-height: 1.4;
      cursor: pointer;
      user-select: none;
    }

    @media (max-width: 600px) {
      #screen {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div id="screen">1. Schuhe?/ Tür/ vor/ stellen</div>

  <script>
    const screen = document.getElementById("screen");

    const frageStruktur = "1. Schuhe?/ Tür/ vor/ stellen";
    const antwort = "Wo sind meine Schuhe? – Ich habe sie vor die Tür gestellt.";

    let zeigtAntwort = false;

    screen.addEventListener("click", () => {
      if (!zeigtAntwort) {
        screen.textContent = antwort;
        zeigtAntwort = true;
      } else {
        screen.textContent = frageStruktur;
        zeigtAntwort = false;
      }
    });
  </script>
</body>
</html>
