<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deutsch Übung</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    body {
      overflow: hidden;
    }

    .screen {
      width: 100vw;
      height: 100vh;
      display: none;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .screen.active {
      display: flex;
    }

    #taskScreen {
      font-size: 2rem;
      line-height: 1.4;
      cursor: pointer;
      user-select: none;
    }

    #taskContent {
      max-width: 900px;
    }

    #endScreen {
      flex-direction: column;
      gap: 24px;
    }

    #endScreen h2 {
      margin: 0;
      font-size: 2rem;
    }

    #endScreen p {
      margin: 0;
      font-size: 1.2rem;
      color: #444;
    }

    .finish-button {
      padding: 16px 32px;
      font-size: 1.1rem;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    .finish-button:hover {
      background-color: #0056b3;
    }

    .finish-button:disabled {
      opacity: 0.7;
      cursor: default;
    }

    @media (max-width: 600px) {
      #taskScreen {
        font-size: 1.8rem;
      }

      #endScreen h2 {
        font-size: 1.6rem;
      }

      #endScreen p {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
  <div id="taskScreen" class="screen active">
    <div id="taskContent"></div>
  </div>

  <div id="endScreen" class="screen">
    <h2>Super, du hast die komplette Aufgabe gemacht.</h2>
    <p>Tippe auf den Button in der Mitte, um abzuschließen.</p>
    <button id="finishButton" class="finish-button">Aufgabe abgeschlossen</button>
  </div>

  <script>
    const taskScreen = document.getElementById("taskScreen");
    const taskContent = document.getElementById("taskContent");
    const endScreen = document.getElementById("endScreen");
    const finishButton = document.getElementById("finishButton");

    const aufgaben = [
      {
        frage: "1. Schuhe?/ Tür/ vor/ stellen",
        antwort: "Wo sind meine Schuhe? – Ich habe sie vor die Tür gestellt."
      },
      {
        frage: "2. Jacke?/ Garderobe/ an/ hängen",
        antwort: "Wo ist meine Jacke? – Ich habe sie an die Garderobe gehängt."
      },
      {
        frage: "3. Führerschein?/ Brieftasche/ in/ stecken",
        antwort: "Wo ist mein Führerschein? – Ich habe ihn in die Brieftasche gesteckt."
      }
    ];

    let index = 0;
    let zeigtAntwort = false;

    function updateScreen() {
      if (zeigtAntwort) {
        taskContent.textContent = aufgaben[index].antwort;
      } else {
        taskContent.textContent = aufgaben[index].frage;
      }
    }

    function showTaskScreen() {
      taskScreen.classList.add("active");
      endScreen.classList.remove("active");
    }

    function showEndScreen() {
      taskScreen.classList.remove("active");
      endScreen.classList.add("active");
    }

    taskScreen.addEventListener("click", () => {
      if (!zeigtAntwort) {
        zeigtAntwort = true;
      } else {
        zeigtAntwort = false;

        if (index < aufgaben.length - 1) {
          index++;
          updateScreen();
        } else {
          showEndScreen();
        }
        return;
      }

      updateScreen();
    });

    // =========================
    // MAIL-MECHANISMUS
    // =========================
    let mailPingImg = null;
    let completionEventId = null;
    let completionNotified = false;

    function notifyTeacherTaskCompleted() {
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyLqhiCn9pVFlInvh3wpgDbM77Y15511_NHQVvm71OjoieU2Vs7JL8BBEjcJT2h3GJ7Og/exec";
      const SECRET = "SxhuleeerQuiz_2025_x98d76_22_MEINSECRET";

      if (!completionEventId) {
        completionEventId =
          (window.crypto && window.crypto.randomUUID)
            ? window.crypto.randomUUID()
            : Date.now() + "_" + Math.random();
      }

      const params = new URLSearchParams({
        secret: SECRET,
        studentName: "MAX MUSTERSCHÜLER",
        eventType: "completed",
        quizTitle: document.title,
        pageUrl: window.location.href,
        eventId: completionEventId,
        cb: Date.now()
      });

      const url = WEB_APP_URL + "?" + params.toString();

      mailPingImg = new Image();
      mailPingImg.src = url;
    }

    finishButton.addEventListener("click", () => {
      if (!completionNotified) {
        completionNotified = true;
        notifyTeacherTaskCompleted();
      }

      finishButton.disabled = true;
      finishButton.textContent = "Mail wurde ausgelöst";
    });

    // Startanzeige
    showTaskScreen();
    updateScreen();
  </script>
</body>
</html>
