<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deutsch Übung</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    #screen {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      box-sizing: border-box;
      font-size: 2rem;
      line-height: 1.4;
      cursor: pointer;
      user-select: none;
    }

    @media (max-width: 600px) {
      #screen {
        font-size: 1.8rem;
      }
    }
  </style>
</head>

<body>
  <div id="screen"></div>

  <script>
    const screen = document.getElementById("screen");

    const aufgaben = [
      {
        frage: "1. Schuhe?/ Tür/ vor/ stellen",
        antwort: "Wo sind meine Schuhe? – Ich habe sie vor die Tür gestellt."
      },
      {
        frage: "2. Jacke?/ Garderobe/ an/ hängen",
        antwort: "Wo ist meine Jacke? – Ich habe sie an die Garderobe gehängt."
      },
      {
        frage: "3. Führerschein?/ Brieftasche/ in/ stecken",
        antwort: "Wo ist mein Führerschein? – Ich habe ihn in die Brieftasche gesteckt."
      },
      {
        frage: "4. Bier?/ Kühlschrank/ in/ stellen",
        antwort: "Wo ist das Bier? – Ich habe es in den Kühlschrank gestellt."
      },
      {
        frage: "5. Fernbedienung?/ Fernsehtisch/ auf/ legen",
        antwort: "Wo ist die Fernbedienung? – Ich habe sie auf den Fernsehtisch gelegt."
      },
      {
        frage: "6. Handy?/ Ladestation/ in/ stecken",
        antwort: "Wo ist mein Handy? – Ich habe es in die Ladestation gesteckt."
      },
      {
        frage: "7. Hemd?/ Waschmaschine/ in/ werfen",
        antwort: "Wo ist mein Hemd? – Ich habe es in die Waschmaschine geworfen."
      },
      {
        frage: "8. Brille?/ Zeitung/ neben/ legen",
        antwort: "Wo ist meine Brille? – Ich habe sie neben die Zeitung gelegt."
      }
    ];

    let index = 0;
    let zeigtAntwort = false;

    function updateScreen() {
      if (zeigtAntwort) {
        screen.textContent = aufgaben[index].antwort;
      } else {
        screen.textContent = aufgaben[index].frage;
      }
    }

    screen.addEventListener("click", () => {
      if (!zeigtAntwort) {
        zeigtAntwort = true;
      } else {
        zeigtAntwort = false;
        index = (index + 1) % aufgaben.length;
      }
      updateScreen();
    });

    // Startanzeige
    updateScreen();
  </script>
</body>
</html>
