<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deutsch Übung</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Allgemeiner Screen */
    .screen {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }

    /* Startscreen */
    #startScreen {
      cursor: pointer;
    }

    #logo {
      width: 90%;
      max-width: 500px;
      margin-bottom: 40px;
    }

    #tapText {
      font-size: 1.5rem;
      opacity: 0.6;
    }

    /* Übungsscreen */
    #exerciseScreen {
      display: none;
      font-size: 2rem;
      line-height: 1.4;
      cursor: pointer;
      user-select: none;
    }

    @media (max-width: 600px) {
      #exerciseScreen {
        font-size: 1.8rem;
      }
    }
  </style>
</head>

<body>

  <!-- STARTSCREEN -->
  <div id="startScreen" class="screen">
    <img id="logo" src="LOGO_DEUTSCHTRIP.png" alt="Logo" />
    <div id="tapText">TAP TO CONTINUE</div>
  </div>

  <!-- ÜBUNG -->
  <div id="exerciseScreen" class="screen"></div>

  <script>
    const startScreen = document.getElementById("startScreen");
    const exerciseScreen = document.getElementById("exerciseScreen");

    // Beim Tap → Startscreen ausblenden, Übung zeigen
    startScreen.addEventListener("click", () => {
      startScreen.style.display = "none";
      exerciseScreen.style.display = "flex";
      updateScreen();
    });

    const aufgaben = [
      {
        frage: "1. Schuhe?/ Tür/ vor/ stellen",
        antwort: "Wo sind meine Schuhe? – Ich habe sie vor die Tür gestellt."
      },
      {
        frage: "2. Jacke?/ Garderobe/ an/ hängen",
        antwort: "Wo ist meine Jacke? – Ich habe sie an die Garderobe gehängt."
      },
      {
        frage: "3. Führerschein?/ Brieftasche/ in/ stecken",
        antwort: "Wo ist mein Führerschein? – Ich habe ihn in die Brieftasche gesteckt."
      }
    ];

    let index = 0;
    let zeigtAntwort = false;

    function updateScreen() {
      if (zeigtAntwort) {
        exerciseScreen.textContent = aufgaben[index].antwort;
      } else {
        exerciseScreen.textContent = aufgaben[index].frage;
      }
    }

    exerciseScreen.addEventListener("click", () => {
      if (!zeigtAntwort) {
        zeigtAntwort = true;
      } else {
        zeigtAntwort = false;
        index = (index + 1) % aufgaben.length;
      }
      updateScreen();
    });
  </script>
</body>
</html>
